<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Product | Supply Chain Transparency</title>
    <!-- Bootstrap CSS for layout framework -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .topnav {
            background-color: #0f2027;
            padding: 15px;
        }
        .topnav .brand {
            color: #fff;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .topnav nav a {
            color: #adb5bd;
            margin-left: 20px;
            text-decoration: none;
        }
        .topnav nav a:hover, .topnav nav a.active {
            color: #fff;
        }
        .page {
            max-width: 700px;
            margin: 50px auto;
            padding: 0 15px;
        }
        .verify-hero {
            text-align: center;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

    <!-- Header Navigation -->
    <header class="topnav d-flex justify-content-between align-items-center">
        <div class="brand">● Supply Chain Transparency</div>
        <nav>
            <a href="dashboard.html">Dashboard</a>
            <a href="products.html">Products</a>
            <a href="suppliers.html">Suppliers</a>
            <a href="track.html">Track Shipment</a>
            <a href="verify.html" class="active">Verify Product</a>
        </nav>
    </header>

    <!-- Main Content Panel -->
    <main class="page">
        <div class="verify-hero">
            <h1>Verify a product</h1>
            <p class="text-muted">Scan a product's QR code, or enter its ID below, to confirm authenticity.</p>
        </div>

        <div class="card p-4 shadow-sm" style="margin-bottom: 20px;">
            <div class="d-flex" style="gap: 10px;">
                <input type="text" id="verifyProductId" class="form-control form-control-lg" placeholder="e.g., PROD-002">
                <button class="btn btn-primary px-4" id="verifyBtn" style="white-space: nowrap;">Verify</button>
            </div>
        </div>

        <!-- Target Container where JavaScript injects the result card -->
        <div id="verifyResult"></div>

        <footer class="hint text-center mt-5 text-muted" style="font-size: 13px;">
            Every result above is backed by an append-only ledger entry — this page does not alter or accept edits to the record.
        </footer>
    </main>

    <!-- Dynamic Third-Party QR Code Engine Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <!-- Project Pipeline Configurations -->
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/verify.js"></script>
</body>
</html>
